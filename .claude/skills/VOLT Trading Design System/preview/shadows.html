<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Elevation & Glow" subtitle="Card shadow + volt/up/down glows" viewport="700x160" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    width: 700px; min-height: 180px;
    background: var(--ink-850);
    color: var(--fg-1);
    font-family: var(--font-body);
    padding: 22px 26px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .row { display: flex; align-items: center; gap: 14px; }
  .col { display: flex; flex-direction: column; }
  .lbl { font: var(--micro); text-transform: uppercase; letter-spacing: 0.14em; color: var(--fg-3); }
  .mono { font-family: var(--font-mono); }
</style>
</head>
<body>
<div class="row" style="gap:24px">
  <div class="col" style="gap:10px;align-items:center;flex:1">
    <div style="width:100%;height:66px;border-radius:var(--r-md);background:var(--ink-800);box-shadow:var(--shadow-card);border:1px solid var(--line)"></div>
    <span class="mono" style="font-size:10.5px;color:var(--fg-2)">card</span>
  </div>
  <div class="col" style="gap:10px;align-items:center;flex:1">
    <div style="width:100%;height:66px;border-radius:var(--r-md);background:var(--ink-750);box-shadow:var(--shadow-pop);border:1px solid var(--line-strong)"></div>
    <span class="mono" style="font-size:10.5px;color:var(--fg-2)">pop</span>
  </div>
  <div class="col" style="gap:10px;align-items:center;flex:1">
    <div style="width:100%;height:66px;border-radius:var(--r-md);background:var(--ink-800);box-shadow:0 0 0 1px var(--volt), 0 0 18px 2px var(--volt-glow), 0 0 46px 6px var(--volt-glow);border:1px solid transparent"></div>
    <span class="mono" style="font-size:10.5px;color:var(--volt)">glow-volt</span>
  </div>
  <div class="col" style="gap:10px;align-items:center;flex:1">
    <div style="width:100%;height:66px;border-radius:var(--r-md);background:var(--ink-800);box-shadow:0 0 0 1px var(--up), 0 0 18px 2px var(--up-glow), 0 0 46px 6px var(--up-glow);border:1px solid transparent"></div>
    <span class="mono" style="font-size:10.5px;color:var(--up)">glow-up</span>
  </div>
  <div class="col" style="gap:10px;align-items:center;flex:1">
    <div style="width:100%;height:66px;border-radius:var(--r-md);background:var(--ink-800);box-shadow:0 0 0 1px var(--down), 0 0 18px 2px var(--down-glow), 0 0 46px 6px var(--down-glow);border:1px solid transparent"></div>
    <span class="mono" style="font-size:10.5px;color:var(--down)">glow-down</span>
  </div>
</div></body></html>
