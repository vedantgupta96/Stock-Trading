<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Logo Lockups" subtitle="On volt, ink, and light backgrounds" viewport="700x150" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    width: 700px; min-height: 150px;
    background: var(--ink-850);
    color: var(--fg-1);
    font-family: var(--font-body);
    padding: 22px 26px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .row { display: flex; align-items: center; gap: 14px; }
  .col { display: flex; flex-direction: column; }
  .lbl { font: var(--micro); text-transform: uppercase; letter-spacing: 0.14em; color: var(--fg-3); }
  .mono { font-family: var(--font-mono); }
  .btn { font-family: var(--font-display); font-weight:600; font-size:13.5px; border:none; cursor:pointer; border-radius: var(--r-sm); padding: 10px 18px; display:inline-flex; align-items:center; gap:8px; }
  .badge { font-family: var(--font-display); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:0.08em; border-radius: var(--r-pill); padding: 5px 11px; display:inline-flex; align-items:center; gap:6px; }
  .bolt { fill: var(--volt); }
</style>
</head>
<body>
<div class="row" style="gap:14px">
  <div style="flex:1;height:96px;border-radius:var(--r-md);background:var(--volt);display:flex;align-items:center;justify-content:center;gap:10px"><svg width="26" height="26" viewBox="0 0 24 24" aria-hidden="true"><path d="M13.5 2 4 13.2h6.2L9.4 22 20 9.9h-6.6z" fill="var(--fg-on-volt)"/></svg><span style="font-family:var(--font-display);font-weight:700;font-size:26px;color:var(--fg-on-volt)">VOLT</span></div>
  <div style="flex:1;height:96px;border-radius:var(--r-md);background:var(--ink-900);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;gap:10px"><svg width="26" height="26" viewBox="0 0 24 24" aria-hidden="true"><path d="M13.5 2 4 13.2h6.2L9.4 22 20 9.9h-6.6z" fill="var(--volt)"/></svg><span style="font-family:var(--font-display);font-weight:700;font-size:26px;color:var(--fg-1)">VOLT</span></div>
  <div style="flex:1;height:96px;border-radius:var(--r-md);background:var(--fg-1);display:flex;align-items:center;justify-content:center;gap:10px"><svg width="26" height="26" viewBox="0 0 24 24" aria-hidden="true"><path d="M13.5 2 4 13.2h6.2L9.4 22 20 9.9h-6.6z" fill="var(--ink-900)"/></svg><span style="font-family:var(--font-display);font-weight:700;font-size:26px;color:var(--ink-900)">VOLT</span></div>
</div></body></html>
