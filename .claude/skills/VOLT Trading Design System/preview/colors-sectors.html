<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Sector Palette" subtitle="Categorical data-viz hues for sectors" viewport="700x150" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    width: 700px; min-height: 150px;
    background: var(--ink-850);
    color: var(--fg-1);
    font-family: var(--font-body);
    padding: 22px 26px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .row { display: flex; align-items: center; gap: 14px; }
  .col { display: flex; flex-direction: column; }
  .lbl { font: var(--micro); text-transform: uppercase; letter-spacing: 0.14em; color: var(--fg-3); }
  .mono { font-family: var(--font-mono); }
</style>
</head>
<body>
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px 14px">
  
  <div class="row" style="gap:9px">
    <span style="width:26px;height:26px;border-radius:8px;background:var(--cat-tech);box-shadow:0 0 14px color-mix(in srgb, var(--cat-tech) 45%, transparent)"></span>
    <span class="mono" style="font-size:12px;color:var(--fg-2)">Technology</span>
  </div>
  <div class="row" style="gap:9px">
    <span style="width:26px;height:26px;border-radius:8px;background:var(--cat-energy);box-shadow:0 0 14px color-mix(in srgb, var(--cat-energy) 45%, transparent)"></span>
    <span class="mono" style="font-size:12px;color:var(--fg-2)">Energy</span>
  </div>
  <div class="row" style="gap:9px">
    <span style="width:26px;height:26px;border-radius:8px;background:var(--cat-health);box-shadow:0 0 14px color-mix(in srgb, var(--cat-health) 45%, transparent)"></span>
    <span class="mono" style="font-size:12px;color:var(--fg-2)">Healthcare</span>
  </div>
  <div class="row" style="gap:9px">
    <span style="width:26px;height:26px;border-radius:8px;background:var(--cat-fin);box-shadow:0 0 14px color-mix(in srgb, var(--cat-fin) 45%, transparent)"></span>
    <span class="mono" style="font-size:12px;color:var(--fg-2)">Financials</span>
  </div>
  <div class="row" style="gap:9px">
    <span style="width:26px;height:26px;border-radius:8px;background:var(--cat-consumer);box-shadow:0 0 14px color-mix(in srgb, var(--cat-consumer) 45%, transparent)"></span>
    <span class="mono" style="font-size:12px;color:var(--fg-2)">Consumer</span>
  </div>
  <div class="row" style="gap:9px">
    <span style="width:26px;height:26px;border-radius:8px;background:var(--cat-indust);box-shadow:0 0 14px color-mix(in srgb, var(--cat-indust) 45%, transparent)"></span>
    <span class="mono" style="font-size:12px;color:var(--fg-2)">Industrials</span>
  </div>
  <div class="row" style="gap:9px">
    <span style="width:26px;height:26px;border-radius:8px;background:var(--cat-material);box-shadow:0 0 14px color-mix(in srgb, var(--cat-material) 45%, transparent)"></span>
    <span class="mono" style="font-size:12px;color:var(--fg-2)">Materials</span>
  </div>
  <div class="row" style="gap:9px">
    <span style="width:26px;height:26px;border-radius:8px;background:var(--cat-comm);box-shadow:0 0 14px color-mix(in srgb, var(--cat-comm) 45%, transparent)"></span>
    <span class="mono" style="font-size:12px;color:var(--fg-2)">Comm.</span>
  </div>
</div></body></html>
