<!DOCTYPE html>
<!-- @dsCard group="Colors" name="P&L Semantic Colors" subtitle="Mint gains · magenta losses · amber caution" viewport="700x160" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    width: 700px; min-height: 175px;
    background: var(--ink-850);
    color: var(--fg-1);
    font-family: var(--font-body);
    padding: 22px 26px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .row { display: flex; align-items: center; gap: 14px; }
  .col { display: flex; flex-direction: column; }
  .lbl { font: var(--micro); text-transform: uppercase; letter-spacing: 0.14em; color: var(--fg-3); }
  .mono { font-family: var(--font-mono); }
  .btn { font-family: var(--font-display); font-weight:600; font-size:13.5px; border:none; cursor:pointer; border-radius: var(--r-sm); padding: 10px 18px; display:inline-flex; align-items:center; gap:8px; }
  .badge { font-family: var(--font-display); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:0.08em; border-radius: var(--r-pill); padding: 5px 11px; display:inline-flex; align-items:center; gap:6px; }
  .bolt { fill: var(--volt); }
</style>
</head>
<body>
<div class="row" style="gap:22px">
  
  <div class="col" style="gap:9px;flex:1">
    <div style="height:68px;border-radius:var(--r-md);background:var(--up);box-shadow:0 0 0 1px var(--up), 0 0 20px 2px var(--up-glow), 0 0 46px 8px var(--up-glow);display:flex;align-items:center;justify-content:center">
      <span class="mono" style="font-size:19px;font-weight:700;color:var(--ink-900)">+2.84%</span>
    </div>
    <span class="lbl">UP / gains</span>
    <div class="row" style="gap:6px">
      <span style="width:18px;height:18px;border-radius:5px;background:var(--up)"></span>
      <span style="width:18px;height:18px;border-radius:5px;background:var(--up-deep)"></span>
      <span style="width:18px;height:18px;border-radius:5px;background:var(--up-100);border:1px solid var(--up)"></span>
    </div>
  </div>
  <div class="col" style="gap:9px;flex:1">
    <div style="height:68px;border-radius:var(--r-md);background:var(--down);box-shadow:0 0 0 1px var(--down), 0 0 20px 2px var(--down-glow), 0 0 46px 8px var(--down-glow);display:flex;align-items:center;justify-content:center">
      <span class="mono" style="font-size:19px;font-weight:700;color:var(--ink-900)">−1.27%</span>
    </div>
    <span class="lbl">DOWN / losses</span>
    <div class="row" style="gap:6px">
      <span style="width:18px;height:18px;border-radius:5px;background:var(--down)"></span>
      <span style="width:18px;height:18px;border-radius:5px;background:var(--down-deep)"></span>
      <span style="width:18px;height:18px;border-radius:5px;background:var(--down-100);border:1px solid var(--down)"></span>
    </div>
  </div>
  <div class="col" style="gap:9px;flex:1">
    <div style="height:68px;border-radius:var(--r-md);background:var(--warn);box-shadow:0 0 0 1px var(--warn), 0 0 20px 2px var(--warn-100), 0 0 46px 8px rgba(255,176,32,0.30);display:flex;align-items:center;justify-content:center">
      <span class="mono" style="font-size:19px;font-weight:700;color:var(--ink-900)">−6.0%</span>
    </div>
    <span class="lbl">WARN / caution</span>
    <div class="row" style="gap:6px">
      <span style="width:18px;height:18px;border-radius:5px;background:var(--warn)"></span>
      <span style="width:18px;height:18px;border-radius:5px;background:var(--warn)"></span>
      <span style="width:18px;height:18px;border-radius:5px;background:var(--warn-100);border:1px solid var(--warn)"></span>
    </div>
  </div>
</div></body></html>
