<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Volt Brand Color" subtitle="Electric chartreuse — base, hover, pressed, tint" viewport="700x150" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    width: 700px; min-height: 150px;
    background: var(--ink-850);
    color: var(--fg-1);
    font-family: var(--font-body);
    padding: 22px 26px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .row { display: flex; align-items: center; gap: 14px; }
  .col { display: flex; flex-direction: column; }
  .lbl { font: var(--micro); text-transform: uppercase; letter-spacing: 0.14em; color: var(--fg-3); }
  .mono { font-family: var(--font-mono); }
</style>
</head>
<body>
<div class="row" style="gap:18px">
  <div style="width:150px;height:104px;border-radius:var(--r-lg);background:var(--volt);box-shadow:var(--glow-volt);display:flex;align-items:flex-end;padding:12px">
    <span class="mono" style="font-size:13px;font-weight:700;color:var(--fg-on-volt)">#CCFF00</span>
  </div>
  <div class="col" style="gap:10px">
    
    <div class="row" style="gap:10px"><span style="width:42px;height:26px;border-radius:7px;background:var(--volt)"></span><span class="mono" style="font-size:12px;color:var(--fg-2)">volt — base</span></div>
    <div class="row" style="gap:10px"><span style="width:42px;height:26px;border-radius:7px;background:var(--volt-bri)"></span><span class="mono" style="font-size:12px;color:var(--fg-2)">volt-bri — hover</span></div>
    <div class="row" style="gap:10px"><span style="width:42px;height:26px;border-radius:7px;background:var(--volt-dim)"></span><span class="mono" style="font-size:12px;color:var(--fg-2)">volt-dim — pressed</span></div>
    <div class="row" style="gap:10px"><span style="width:42px;height:26px;border-radius:7px;background:var(--volt-100);border:1px solid var(--volt)"></span><span class="mono" style="font-size:12px;color:var(--fg-2)">volt-100 — tint wash</span></div>
  </div>
</div></body></html>
