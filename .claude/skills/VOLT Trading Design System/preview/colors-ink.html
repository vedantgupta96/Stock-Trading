<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Ink Surfaces & Text" subtitle="Near-black surface scale + text hierarchy" viewport="700x150" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    width: 700px; min-height: 150px;
    background: var(--ink-850);
    color: var(--fg-1);
    font-family: var(--font-body);
    padding: 22px 26px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .row { display: flex; align-items: center; gap: 14px; }
  .col { display: flex; flex-direction: column; }
  .lbl { font: var(--micro); text-transform: uppercase; letter-spacing: 0.14em; color: var(--fg-3); }
  .mono { font-family: var(--font-mono); }
</style>
</head>
<body>
<div class="col" style="gap:16px">
  <div class="row" style="gap:10px">
    
    <div class="col" style="gap:8px;align-items:center">
      <div style="width:74px;height:56px;border-radius:var(--r-md);background:var(--ink-900);border:1px solid var(--line)"></div>
      <span class="mono" style="font-size:11px;color:var(--fg-2)">ink-900</span>
    </div>
    <div class="col" style="gap:8px;align-items:center">
      <div style="width:74px;height:56px;border-radius:var(--r-md);background:var(--ink-850);border:1px solid var(--line)"></div>
      <span class="mono" style="font-size:11px;color:var(--fg-2)">ink-850</span>
    </div>
    <div class="col" style="gap:8px;align-items:center">
      <div style="width:74px;height:56px;border-radius:var(--r-md);background:var(--ink-800);border:1px solid var(--line)"></div>
      <span class="mono" style="font-size:11px;color:var(--fg-2)">ink-800</span>
    </div>
    <div class="col" style="gap:8px;align-items:center">
      <div style="width:74px;height:56px;border-radius:var(--r-md);background:var(--ink-750);border:1px solid var(--line)"></div>
      <span class="mono" style="font-size:11px;color:var(--fg-2)">ink-750</span>
    </div>
    <div class="col" style="gap:8px;align-items:center">
      <div style="width:74px;height:56px;border-radius:var(--r-md);background:var(--ink-700);border:1px solid var(--line)"></div>
      <span class="mono" style="font-size:11px;color:var(--fg-2)">ink-700</span>
    </div>
    <div class="col" style="gap:8px;align-items:center">
      <div style="width:74px;height:56px;border-radius:var(--r-md);background:var(--ink-650);border:1px solid var(--line)"></div>
      <span class="mono" style="font-size:11px;color:var(--fg-2)">ink-650</span>
    </div>
    <div class="col" style="gap:8px;align-items:center">
      <div style="width:74px;height:56px;border-radius:var(--r-md);background:var(--ink-600);border:1px solid var(--line)"></div>
      <span class="mono" style="font-size:11px;color:var(--fg-2)">ink-600</span>
    </div>
  </div>
  <div class="row" style="gap:24px">
    
    <div class="row" style="gap:8px"><span style="width:16px;height:16px;border-radius:5px;background:var(--fg-1)"></span><span class="mono" style="font-size:12px;color:var(--fg-1)">fg-1</span></div>
    <div class="row" style="gap:8px"><span style="width:16px;height:16px;border-radius:5px;background:var(--fg-2)"></span><span class="mono" style="font-size:12px;color:var(--fg-2)">fg-2</span></div>
    <div class="row" style="gap:8px"><span style="width:16px;height:16px;border-radius:5px;background:var(--fg-3)"></span><span class="mono" style="font-size:12px;color:var(--fg-3)">fg-3</span></div>
    <div class="row" style="gap:8px"><span style="width:16px;height:16px;border-radius:5px;background:var(--fg-4)"></span><span class="mono" style="font-size:12px;color:var(--fg-4)">fg-4</span></div>
  </div>
</div></body></html>
