<!DOCTYPE html>
<!-- @dsCard group="Components" name="Buttons" subtitle="Primary / secondary / ghost / danger + states" viewport="700x170" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    width: 700px; min-height: 170px;
    background: var(--ink-850);
    color: var(--fg-1);
    font-family: var(--font-body);
    padding: 22px 26px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .row { display: flex; align-items: center; gap: 14px; }
  .col { display: flex; flex-direction: column; }
  .lbl { font: var(--micro); text-transform: uppercase; letter-spacing: 0.14em; color: var(--fg-3); }
  .mono { font-family: var(--font-mono); }
  .btn { font-family: var(--font-display); font-weight:600; font-size:13.5px; border:none; cursor:pointer; border-radius: var(--r-sm); padding: 10px 18px; display:inline-flex; align-items:center; gap:8px; white-space:nowrap; }
  .badge { font-family: var(--font-display); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:0.08em; border-radius: var(--r-pill); padding: 5px 11px; display:inline-flex; align-items:center; gap:6px; }
  .bolt { fill: var(--volt); }
</style>
</head>
<body>
<div class="col" style="gap:16px">
  <div class="row" style="gap:12px">
    <button class="btn" style="background:var(--volt);color:var(--fg-on-volt);box-shadow:var(--glow-volt)"><svg width="15" height="15" viewBox="0 0 24 24" aria-hidden="true"><path d="M13.5 2 4 13.2h6.2L9.4 22 20 9.9h-6.6z" fill="var(--fg-on-volt)"/></svg> Refresh Live</button>
    <button class="btn" style="background:var(--ink-700);color:var(--fg-1);border:1px solid var(--line-strong)">Manual Trade</button>
    <button class="btn" style="background:transparent;color:var(--fg-2);border:1px solid var(--line)">Cancel</button>
    <button class="btn" style="background:var(--down-100);color:var(--down);border:1px solid var(--down)">Close Position</button>
  </div>
  <div class="row" style="gap:12px">
    <span class="lbl" style="width:62px">states</span>
    <button class="btn" style="background:var(--volt);color:var(--fg-on-volt)">default</button>
    <button class="btn" style="background:var(--volt-bri);color:var(--fg-on-volt);box-shadow:var(--glow-volt)">hover</button>
    <button class="btn" style="background:var(--volt-dim);color:var(--fg-on-volt);transform:scale(0.97)">pressed</button>
    <button class="btn" style="background:var(--ink-700);color:var(--fg-4)">disabled</button>
  </div>
</div></body></html>
