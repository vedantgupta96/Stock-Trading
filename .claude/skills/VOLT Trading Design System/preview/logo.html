<!DOCTYPE html>
<!-- @dsCard group="Brand" name="VOLT Logo" subtitle="Wordmark + bolt mark variants" viewport="700x160" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    width: 700px; min-height: 160px;
    background: var(--ink-850);
    color: var(--fg-1);
    font-family: var(--font-body);
    padding: 22px 26px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .row { display: flex; align-items: center; gap: 14px; }
  .col { display: flex; flex-direction: column; }
  .lbl { font: var(--micro); text-transform: uppercase; letter-spacing: 0.14em; color: var(--fg-3); }
  .mono { font-family: var(--font-mono); }
  .btn { font-family: var(--font-display); font-weight:600; font-size:13.5px; border:none; cursor:pointer; border-radius: var(--r-sm); padding: 10px 18px; display:inline-flex; align-items:center; gap:8px; }
  .badge { font-family: var(--font-display); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:0.08em; border-radius: var(--r-pill); padding: 5px 11px; display:inline-flex; align-items:center; gap:6px; }
  .bolt { fill: var(--volt); }
</style>
</head>
<body>
<div class="row" style="gap:44px;align-items:center">
  <div class="row" style="gap:15px;padding:6px 4px;position:relative">
    <div style="position:absolute;left:-6px;top:50%;transform:translateY(-50%);width:130px;height:90px;background:radial-gradient(closed,var(--volt-glow),transparent 70%);background:radial-gradient(ellipse,var(--volt-glow),transparent 70%);filter:blur(6px);opacity:0.55;pointer-events:none"></div>
    <div style="position:relative;width:58px;height:58px;border-radius:var(--r-md);background:var(--volt);display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 1px var(--volt), 0 0 26px 3px var(--volt-glow), 0 0 60px 10px var(--volt-glow)"><svg width="34" height="34" viewBox="0 0 24 24" aria-hidden="true"><path d="M13.5 2 4 13.2h6.2L9.4 22 20 9.9h-6.6z" fill="var(--fg-on-volt)"/></svg></div>
    <span style="position:relative;font-family:var(--font-display);font-weight:700;font-size:38px;letter-spacing:-0.02em;text-shadow:0 0 22px var(--volt-glow)">VOLT</span>
  </div>
  <div class="col" style="gap:12px">
    <div class="row" style="gap:9px"><div style="width:32px;height:32px;border-radius:8px;background:var(--volt);display:flex;align-items:center;justify-content:center;box-shadow:0 0 18px 1px var(--volt-glow)"><svg width="19" height="19" viewBox="0 0 24 24" aria-hidden="true"><path d="M13.5 2 4 13.2h6.2L9.4 22 20 9.9h-6.6z" fill="var(--fg-on-volt)"/></svg></div><span style="font-family:var(--font-display);font-weight:700;font-size:18px">VOLT</span></div>
    <div class="row" style="gap:9px"><div style="width:32px;height:32px;border-radius:8px;background:var(--ink-700);display:flex;align-items:center;justify-content:center;border:1px solid var(--volt);box-shadow:0 0 16px 0 var(--volt-glow)"><svg width="19" height="19" viewBox="0 0 24 24" aria-hidden="true"><path d="M13.5 2 4 13.2h6.2L9.4 22 20 9.9h-6.6z" fill="var(--volt)"/></svg></div><span style="font-family:var(--font-display);font-weight:700;font-size:18px;color:var(--fg-1)">VOLT</span></div>
  </div>
</div></body></html>
