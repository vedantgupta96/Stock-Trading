<!DOCTYPE html>
<!-- @dsCard group="Components" name="Badges & Flags" subtitle="Regime, sectors, position warnings" viewport="700x190" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    width: 700px; min-height: 190px;
    background: var(--ink-850);
    color: var(--fg-1);
    font-family: var(--font-body);
    padding: 22px 26px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .row { display: flex; align-items: center; gap: 14px; }
  .col { display: flex; flex-direction: column; }
  .lbl { font: var(--micro); text-transform: uppercase; letter-spacing: 0.14em; color: var(--fg-3); }
  .mono { font-family: var(--font-mono); }
  .btn { font-family: var(--font-display); font-weight:600; font-size:13.5px; border:none; cursor:pointer; border-radius: var(--r-sm); padding: 10px 18px; display:inline-flex; align-items:center; gap:8px; }
  .badge { font-family: var(--font-display); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:0.08em; border-radius: var(--r-pill); padding: 5px 11px; display:inline-flex; align-items:center; gap:6px; }
  .bolt { fill: var(--volt); }
</style>
</head>
<body>
<div class="col" style="gap:14px">
  <div class="row" style="gap:10px">
    <span class="badge" style="background:var(--up-100);color:var(--up);border:1px solid color-mix(in srgb,var(--up) 50%,transparent)"><span style="width:7px;height:7px;border-radius:50%;background:var(--up);box-shadow:0 0 8px var(--up)"></span>Regime: On</span>
    <span class="badge" style="background:var(--down-100);color:var(--down);border:1px solid color-mix(in srgb,var(--down) 50%,transparent)"><span style="width:7px;height:7px;border-radius:50%;background:var(--down)"></span>Regime: Off</span>
    <span class="badge" style="background:var(--volt-100);color:var(--volt);border:1px solid color-mix(in srgb,var(--volt) 45%,transparent)">Live</span>
  </div>
  <div class="row" style="gap:10px">
    
    <span class="badge" style="background:color-mix(in srgb,var(--cat-tech) 14%,transparent);color:var(--cat-tech);border:1px solid color-mix(in srgb,var(--cat-tech) 45%,transparent)">Technology</span>
    <span class="badge" style="background:color-mix(in srgb,var(--cat-energy) 14%,transparent);color:var(--cat-energy);border:1px solid color-mix(in srgb,var(--cat-energy) 45%,transparent)">Energy</span>
    <span class="badge" style="background:color-mix(in srgb,var(--cat-health) 14%,transparent);color:var(--cat-health);border:1px solid color-mix(in srgb,var(--cat-health) 45%,transparent)">Healthcare</span>
    <span class="badge" style="background:color-mix(in srgb,var(--cat-consumer) 14%,transparent);color:var(--cat-consumer);border:1px solid color-mix(in srgb,var(--cat-consumer) 45%,transparent)">Consumer</span>
    <span class="badge" style="background:color-mix(in srgb,var(--cat-indust) 14%,transparent);color:var(--cat-indust);border:1px solid color-mix(in srgb,var(--cat-indust) 45%,transparent)">Industrials</span>
  </div>
  <div class="row" style="gap:10px">
    <span class="badge" style="background:var(--down-100);color:var(--down);border:1px solid var(--down);font-weight:700">⚠ No Stop</span>
    <span class="badge" style="background:var(--warn-100);color:var(--warn);border:1px solid color-mix(in srgb,var(--warn) 45%,transparent)">Near −8% Stop</span>
    <span class="badge" style="background:var(--up-100);color:var(--up);border:1px solid color-mix(in srgb,var(--up) 45%,transparent)">↑ Tighten 7%</span>
  </div>
</div></body></html>
