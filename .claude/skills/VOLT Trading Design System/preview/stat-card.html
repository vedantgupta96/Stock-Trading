<!DOCTYPE html>
<!-- @dsCard group="Components" name="Stat Cards" subtitle="Portfolio value + day P&L tiles" viewport="700x170" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    width: 700px; min-height: 170px;
    background: var(--ink-850);
    color: var(--fg-1);
    font-family: var(--font-body);
    padding: 22px 26px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .row { display: flex; align-items: center; gap: 14px; }
  .col { display: flex; flex-direction: column; }
  .lbl { font: var(--micro); text-transform: uppercase; letter-spacing: 0.14em; color: var(--fg-3); }
  .mono { font-family: var(--font-mono); }
  .btn { font-family: var(--font-display); font-weight:600; font-size:13.5px; border:none; cursor:pointer; border-radius: var(--r-sm); padding: 10px 18px; display:inline-flex; align-items:center; gap:8px; }
  .badge { font-family: var(--font-display); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:0.08em; border-radius: var(--r-pill); padding: 5px 11px; display:inline-flex; align-items:center; gap:6px; }
  .bolt { fill: var(--volt); }
</style>
</head>
<body>
<div class="row" style="gap:14px">
  <div style="flex:1;background:var(--ink-800);border:1px solid var(--line);border-radius:var(--r-lg);padding:16px 18px;box-shadow:var(--shadow-card)">
    <p class="lbl" style="margin-bottom:10px">Portfolio Value</p>
    <p class="mono" style="font-size:30px;font-weight:700;letter-spacing:-0.01em">$24,318.07</p>
    <p class="mono is-up" style="font-size:13px;font-weight:600;margin-top:6px">+$612.40 today</p>
  </div>
  <div style="flex:1;background:var(--ink-800);border:1px solid var(--line);border-radius:var(--r-lg);padding:16px 18px;box-shadow:var(--shadow-card)">
    <p class="lbl" style="margin-bottom:10px">Day P&amp;L</p>
    <p class="mono is-up" style="font-size:30px;font-weight:700;letter-spacing:-0.01em">+2.58%</p>
    <p class="mono" style="font-size:13px;color:var(--fg-3);margin-top:6px">5 positions open</p>
  </div>
</div></body></html>
