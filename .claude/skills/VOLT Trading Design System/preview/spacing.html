<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Spacing Scale" subtitle="4px base spacing tokens" viewport="700x150" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    width: 700px; min-height: 150px;
    background: var(--ink-850);
    color: var(--fg-1);
    font-family: var(--font-body);
    padding: 22px 26px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .row { display: flex; align-items: center; gap: 14px; }
  .col { display: flex; flex-direction: column; }
  .lbl { font: var(--micro); text-transform: uppercase; letter-spacing: 0.14em; color: var(--fg-3); }
  .mono { font-family: var(--font-mono); }
</style>
</head>
<body>
<div class="col" style="gap:12px">
  <span class="lbl">Spacing scale · 4px base</span>
  <div class="row" style="gap:10px;align-items:flex-end">
    
    <div class="col" style="gap:6px;align-items:center">
      <div style="width:4px;height:4px;background:var(--volt);border-radius:3px"></div>
      <span class="mono" style="font-size:10px;color:var(--fg-3)">4</span>
    </div>
    <div class="col" style="gap:6px;align-items:center">
      <div style="width:8px;height:8px;background:var(--volt);border-radius:3px"></div>
      <span class="mono" style="font-size:10px;color:var(--fg-3)">8</span>
    </div>
    <div class="col" style="gap:6px;align-items:center">
      <div style="width:12px;height:12px;background:var(--volt);border-radius:3px"></div>
      <span class="mono" style="font-size:10px;color:var(--fg-3)">12</span>
    </div>
    <div class="col" style="gap:6px;align-items:center">
      <div style="width:16px;height:16px;background:var(--volt);border-radius:3px"></div>
      <span class="mono" style="font-size:10px;color:var(--fg-3)">16</span>
    </div>
    <div class="col" style="gap:6px;align-items:center">
      <div style="width:20px;height:20px;background:var(--volt);border-radius:3px"></div>
      <span class="mono" style="font-size:10px;color:var(--fg-3)">20</span>
    </div>
    <div class="col" style="gap:6px;align-items:center">
      <div style="width:24px;height:24px;background:var(--volt);border-radius:3px"></div>
      <span class="mono" style="font-size:10px;color:var(--fg-3)">24</span>
    </div>
    <div class="col" style="gap:6px;align-items:center">
      <div style="width:32px;height:32px;background:var(--volt);border-radius:3px"></div>
      <span class="mono" style="font-size:10px;color:var(--fg-3)">32</span>
    </div>
    <div class="col" style="gap:6px;align-items:center">
      <div style="width:40px;height:40px;background:var(--volt);border-radius:3px"></div>
      <span class="mono" style="font-size:10px;color:var(--fg-3)">40</span>
    </div>
    <div class="col" style="gap:6px;align-items:center">
      <div style="width:48px;height:48px;background:var(--volt);border-radius:3px"></div>
      <span class="mono" style="font-size:10px;color:var(--fg-3)">48</span>
    </div>
  </div>
</div></body></html>
