<!DOCTYPE html>
<!-- @dsCard group="Components" name="Position Card" subtitle="Live position w/ sparkline + R:R bar" viewport="700x200" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    width: 700px; min-height: 200px;
    background: var(--ink-850);
    color: var(--fg-1);
    font-family: var(--font-body);
    padding: 22px 26px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .row { display: flex; align-items: center; gap: 14px; }
  .col { display: flex; flex-direction: column; }
  .lbl { font: var(--micro); text-transform: uppercase; letter-spacing: 0.14em; color: var(--fg-3); }
  .mono { font-family: var(--font-mono); }
  .btn { font-family: var(--font-display); font-weight:600; font-size:13.5px; border:none; cursor:pointer; border-radius: var(--r-sm); padding: 10px 18px; display:inline-flex; align-items:center; gap:8px; }
  .badge { font-family: var(--font-display); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:0.08em; border-radius: var(--r-pill); padding: 5px 11px; display:inline-flex; align-items:center; gap:6px; }
  .bolt { fill: var(--volt); }
</style>
</head>
<body>
<div style="background:var(--ink-800);border:1px solid color-mix(in srgb,var(--up) 28%,transparent);border-radius:var(--r-lg);padding:15px 16px;box-shadow:var(--glow-up)">
  <div class="row" style="justify-content:space-between">
    <div class="row" style="gap:9px">
      <span style="font-family:var(--font-display);font-weight:700;font-size:19px">NVDA</span>
      <span class="badge" style="background:color-mix(in srgb,var(--cat-tech) 14%,transparent);color:var(--cat-tech);border:1px solid color-mix(in srgb,var(--cat-tech) 45%,transparent)">Technology</span>
    </div>
    <div class="col" style="align-items:flex-end">
      <span class="mono is-up" style="font-size:17px;font-weight:700">+14.82%</span>
      <span class="mono is-up" style="font-size:12px">+$418.20</span>
    </div>
  </div>
  <svg viewBox="0 0 300 40" preserveAspectRatio="none" style="width:100%;height:40px;margin:12px 0 8px"><polyline points="0,32 40,28 80,30 120,22 160,18 200,20 240,10 300,5" fill="none" stroke="var(--up)" stroke-width="2"/></svg>
  <div style="height:6px;border-radius:99px;background:var(--ink-700);position:relative;overflow:hidden">
    <div style="position:absolute;left:0;top:0;bottom:0;width:74%;background:linear-gradient(90deg,var(--down),var(--warn),var(--up))"></div>
    <div style="position:absolute;left:74%;top:-3px;width:3px;height:12px;background:var(--fg-1)"></div>
  </div>
  <div class="row" style="justify-content:space-between;margin-top:10px;padding-top:9px;border-top:1px solid var(--line)">
    <span class="mono" style="font-size:11px;color:var(--fg-3)">42 sh @ $118.40</span>
    <span class="mono" style="font-size:11px;color:var(--warn)">⏰ 8d time-stop</span>
  </div>
</div></body></html>
